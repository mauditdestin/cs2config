unbindall

// LOADING CFG

echo " "
echo "//  ====================================================================  // "
echo "//                             YUUKA'S CFG                                // "
echo "//  ====================================================================  // "


// MOVEMENT

bind "w" "+forward"
bind "a" "+left"
bind "s" "+back"
bind "d" "+right"
bind "CTRL" "+duck"
bind "SHIFT" "+sprint"

// JUMPING

bind "mwheeldown" "+jump"
bind "space" "+jump"

// SHOOT & MORE

bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "h" "switchhands"
bind "y" "+lookatweapon; show_loadout_toggle"
bind "v" "+voicerecord"

// SCRIPTS

// Drop bomb instant
alias "+dropbombbind" "slot3; slot5"
alias "-dropbombbind" "slot3; slot5; drop"
bind "alt" "+dropbombbind"

// Tab
alias +netg "cl_showfps 2; +showscores"
alias -netg "cl_showfps 1; -showscores"
bind "tab" "+netg"

// INVENTORY

bind "1" "MOUSE4"
bind "2" "MOUSE5"
bind "3" "MOUSE3"
bind "4" "slot4"
bind "5" "slot5"
bind "v" "slot7"        
bind "space" "slot8"
bind "x" "slot9"
bind "z" "slot10"


// OTHERS
bind "mouse_x" "yaw"
bind "mouse_y" "pitch"