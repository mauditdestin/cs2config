unbindall

// LOADING CFG

echo " "
echo "//  ====================================================================  // "
echo "//                             YUUKA'S CFG                                // "
echo "//  ====================================================================  // "


// MOVEMENT

bind "z" "+forward"
bind "q" "+left"
bind "s" "+back"
bind "d" "+right"
bind "CTRL" "+duck"
bind "SHIFT" "+sprint"
bind "mouse_x" "yaw"
bind "mouse_y" "pitch"

// JUMPING

bind "mwheeldown" "+jump"
bind "space" "+jump"

// SHOOT & MORE

bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "h" "switchhands"
bind "y" "+lookatweapon; show_loadout_toggle"
bind "v" "+voicerecord"
bind "w" "player_ping"
bind "t" "+spray_menu"
bind "F3" "autobuy"

// SCRIPTS

// Drop bomb instant
alias "+dropbombbind" "slot3; slot5"
alias "-dropbombbind" "slot3; slot5; drop"
bind "alt" "+dropbombbind"

// INVENTORY

bind "MOUSE4" "slot1"
bind "MOUSE5" "slot2"
bind "MOUSE3" "slot3"
bind "3" "slot4"
bind "a" "slot7"        
bind "f" "slot8"
bind "1" "slot10"
bind "x" "slot12"
bind "mwheelup" "invnext"


// MENUS
bind "\" "toggleconsole"
bind "²" "toggleconsole"
bind "b" "buymenu"
bind "ESCAPE" "cancelselect"
bind "u" "messagemode"
bind "i" "messagemode2"
bind "TAB" "+showscores"
bind "DEL" "disconnect"
bind "m" "teammenu"
bind "F1" "vote yes"
bind "F2" "vote no"
bind "F6" "voice_modenable_toggle" 
bind "F4" "say Choose your excuse: 1.Lags | 2.New mouse | 3.Low FPS | 4.Low team | 5.Hacker | 6.Lucker | 7.Smurf | 8.Hitbox | 9.Tickrate"
bind "=" "say ¯\\_(ツ)_/¯"



// CROSSHAIR

cl_crosshair_drawoutline "1"
cl_crosshair_outlinethickness "0"
cl_crosshairalpha "255"
cl_crosshaircolor "5"
cl_crosshairdot "0"
cl_crosshairgap "-3.1"
cl_crosshairsize "0.9"
cl_crosshairstyle "4"
cl_crosshairthickness ".5"
cl_crosshair_sniper_width "1"


// IGN

volume .8
zoom_sensitivity_ratio 1.00
sensitivity .35
snd_deathcamera_volume 0.1
r_fullscreen_gamma 2.20

fps_max 300
fps_max_ui 200
fps_max_tools 10
hud_scaling 0.9
cl_autohelp 0

viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 0
viewmodel_offset_z -1.5 
viewmodel_presetpos 2

cl_hud_color 5
cl_color 4
cl_weapon_selection_rarity_color 1
cl_teamcounter_playercount_instead_of_avatars 1
cl_hud_radar_background_alpha 0.62
cl_hud_radar_scale 1
cl_radar_scale 0.4
cl_radar_scale_alternate 1
cl_radar_icon_scale_min 0.60

cl_sanitize_muted_players 1
cl_allow_animated_avatars 0
cl_player_ping_mute 0
cl_predict_body_shot_fx 0
cl_predict_head_shot_fx 0
cl_predict_kill_ragdolls 0
mm_session_search_qos_timeout 40
mm_dedicated_search_maxping 40

cl_showloadout "1"
cl_hud_telemetry_ping_show "2"
cl_hud_telemetry_frametime_show "2"
cl_teammate_colors_show "1"