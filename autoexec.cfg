// LOADING CFG

echo " "
echo "********************************************"
echo "*** AUTOEXEC CHARGE - BONNE CHANCE    ***"
echo "********************************************"
echo " "

// MOVEMENT

bind "w" "+forward"
bind "a" "+left"
bind "s" "+back"
bind "d" "+right"

// JUMPING

bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"

// SHOOT & MORE

bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "h" "switchhands"
bind "q" "+lookatweapon"
bind "MOUSE4" "+voicerecord"

// SCRIPTS (ALIAS)

// QuickSwitch
alias +qsw "slot3"
alias -qsw "lastinv"
bind "v" "+qsw"

// Drop bomb instant
alias "+dropbombbind" "slot3; slot5"
alias "-dropbombbind" "slot3; slot5; drop"
bind "alt" "+dropbombbind"

// Better Tab
alias +netg "cl_showfps 2; +showscores"
alias -netg "cl_showfps 1; -showscores"
bind "tab" "+netg"

// Jumpthrow
alias "+jumpthrow" "+jump"
alias "-jumpthrow" "-jump"
alias "+throwaction" "-attack; -attack2"
bind "h" "+jumpthrow; +throwaction"

// INVENTORY

bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "4" "slot6"
bind "x" "slot7"
bind "space" "slot8"
bind "9" "slot9"
bind "z" "slot10"


// MENUS AND REST

bind "b" "buymenu"
bind "q" "show_loadout_toggle"
bind "ESCAPE" "cancelselect"
bind "\" "toggleconsole"
bind "DEL" "disconnect"
bind "y" "messagemode"
bind "u" "messagemode2"


// CROSSHAIR

cl_crosshair_drawoutline "0"
cl_crosshair_outlinethickness "1.000000"
cl_crosshairalpha "255"
cl_crosshaircolor "5"
cl_crosshairdot "0"
cl_crosshairgap "-2.8"
cl_crosshairsize "1"
cl_crosshairstyle "4"
cl_crosshairthickness "0.500000"
cl_crosshair_sniper_width "1"

// COMMANDS IGN

bind "mouse_x" "yaw"
bind "mouse_y" "pitch"
sensitivity 1.2
zoom_sensitivity_ratio 1.00

r_fullscreen_gamma 2.5
fps_max 450
fps_max_ui 200
fps_max_tools 10
cl_showfps 1
hud_scaling 1
cl_autohelp 0

viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 0
viewmodel_offset_z -1.5 
viewmodel_presetpos 3

cl_hud_color 13
cl_color 3
hud_scaling "0.90"
cl_weapon_selection_rarity_color 0
cl_teamcounter_playercount_instead_of_avatars 1
cl_hud_radar_background_alpha 1
cl_hud_radar_scale 1.15
cl_radar_scale 0.30
cl_radar_scale_alternate 0.80
cl_radar_icon_scale_min 0

cl_sanitize_muted_players 1
cl_allow_animated_avatars 0
cl_player_ping_mute 1
cl_predict_body_shot_fx 0
cl_predict_head_shot_fx 0
cl_predict_kill_ragdolls 0
mm_session_search_qos_timeout 40
mm_dedicated_search_maxping 40

cl_showloadout "1"
cl_hud_telemetry_ping_show "2"
cl_hud_telemetry_frametime_show "2"
cl_teammate_colors_show "1"