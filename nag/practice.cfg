// ====================================================================
// CONFIG FOR PRACTICE AND SMOKES TRAINING
// ====================================================================

// GENERAL CONFIG
sv_cheats true
bot_kick
mp_warmup_end
mp_team_intro_time 0
mp_autokick false

// TEAMS COMMANDS
mp_limitteams 0
mp_autoteambalance false

// ROUND OF 60 MINUTES
mp_roundtime 60
mp_roundtime_defuse 60
mp_roundtime_hostage 60
mp_freezetime 0

// FULL MONEY UNLIMITED
mp_maxmoney 60000
mp_startmoney 60000
mp_buytime 9999
mp_buy_anywhere 1

// UNLIMITED AMMO
sv_infinite_ammo 1
ammo_grenade_limit_total 6

// AUTOMATIC RESPAWN & BOTS
mp_respawn_on_death_ct true
mp_respawn_on_death_t true
bot_stop 1

// ====================================================================
// BINDS
// ====================================================================

// FULL WEAPONS
give weapon_smokegrenade
give weapon_molotov
give weapon_flashbang
give weapon_hegrenade
give weapon_ak47

// MOVEMENTS AND SPEED
bind "n" "noclip"
bind "q" "toggle host_timescale 1 10"
bind "x" "bot_place"

// GRENADES RETHROW & DISPAWN
bind "F2" "sv_rethrow_last_grenade"
bind "F3" "ent_fire smokegrenade_projectile kill; ent_fire molotov_projectile kill; ent_fire inferno kill; ent_fire flashbang_projectile kill; ent_fire hegrenade_projectile kill; ent_fire decoy_projectile kill; stopsound"

alias "full_stuff" "sv_cheats 1; give weapon_ak47; give weapon_vesthelm; give weapon_flashbang; give weapon_smokegrenade; give weapon_hegrenade; give weapon_molotov"
bind "F5" "full_stuff"


// ====================================================================
// TOGGLE BHOP
// ====================================================================

// 1. ACTIVATED BHOP (INFINITE BHOP + PREVIEW NADE + BULLETS IMPACT)
alias "bhop_on" "sv_autobunnyhopping 1; sv_enablebunnyhopping 1; sv_staminajumpcost 0; sv_staminalandcost 0; sv_staminamax 0; sv_airaccelerate 10000; sv_maxspeed 10000; sv_maxvelocity 10000; sv_grenade_trajectory_prac_pipreview true; sv_showimpacts 1; echo [BHOP & VISUELS ACTIVÉS]; alias toggle_bhop bhop_off"

// 2. DESACTIVATED BHOP (DEFAULT VALUE)
alias "bhop_off" "sv_autobunnyhopping 0; sv_enablebunnyhopping 0; sv_staminajumpcost 0.08; sv_staminalandcost 0.05; sv_staminamax 80; sv_airaccelerate 12; sv_maxspeed 320; sv_maxvelocity 3500; sv_grenade_trajectory_prac_pipreview true; sv_showimpacts 1; play sounds/ui/buttonclickrelease; echo [BHOP & VISUELS DÉSACTIVÉS]; alias toggle_bhop bhop_on"

// 3. INITIALISATION (DESACTIVATED WHEN LOADING THE FILE)
alias "toggle_bhop" "bhop_on"

// 4. BIND FOR TOGGLING BHOP
bind "F4" "toggle_bhop"

// CONFRIMATION MESSAGE IN THE CONSOLE
echo ""
echo "========================================================"
echo " PRACTICE CONFIG LOADED WITH SUCCESS             "
echo " PLEASE, PRESS F4 TO ACTIVATE OR DESACTIVATE BHOP   "
echo "========================================================"
echo ""