unbindall

echo " "
echo "********************************************************"
echo "*** ATTENTION : YEUX EN COURS DE DISSOLUTION      ***"
echo "*** BINDS OK | VISUELS CATASTROPHIQUES          ***"
echo "********************************************************"
echo " "

// --- 1. TES BINDS DE BASE ---
bind "w" "+forward"
bind "a" "+left"
bind "s" "+back"
bind "d" "+right"
bind "CTRL" "+duck"
bind "SHIFT" "+sprint"
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "h" "switchhands"
bind "q" "+lookatweapon"
bind "MOUSE4" "+voicerecord"
bind "mouse_x" "yaw"
bind "mouse_y" "pitch"

// --- 2. SCRIPTS ---

// QuickSwitch
alias +qsw "slot3"; alias -qsw "lastinv"; bind "MOUSE5" "+qsw"

// Drop bomb instant
alias "+dropbombbind" "slot3; slot5"; alias "-dropbombbind" "slot3; slot5; drop"; bind "alt" "+dropbombbind"

// Tab Stats
alias +netg "cl_showfps 2; +showscores"; alias -netg "cl_showfps 1; -showscores"; bind "tab" "+netg"

// --- 3. INVENTAIRE & MENUS ---
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "v" "slot7"
bind "space" "slot8"
bind "x" "slot9"
bind "z" "slot10"
bind "b" "buymenu"
bind "ESCAPE" "cancelselect"
bind "\" "toggleconsole"
bind "DEL" "disconnect"
bind "y" "messagemode"
bind "u" "messagemode2"
bind "m" "teammenu"
bind "F1" "vote yes"
bind "F2" "vote no"
bind "F3" "autobuy"
bind "F4" "say Choose your excuse: 1.Lags | 2.New mouse | 3.Low FPS | 4.Low team | 5.Hacker | 6.Lucker | 7.Smurf | 8.Hitbox | 9.Tickrate"
bind "=" "say ¯\\_(ツ)_/¯"
bind "mouse3" "player_ping"

// =============================================================
// --- 4. CURSED
// =============================================================

// SENS
sensitivity "15" 
zoom_sensitivity_ratio "2.0"

// CROSSHAIR
cl_crosshair_drawoutline "1"
cl_crosshair_outlinethickness "3"
cl_crosshairalpha "255"
cl_crosshaircolor "5"
cl_crosshaircolor_b "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_r "0"
cl_crosshairdot "1"
cl_crosshairgap "0"
cl_crosshairsize "0"
cl_crosshairstyle "4"
cl_crosshairthickness "15"

// VIEWMODEL "T-REX"
viewmodel_fov "54"
viewmodel_offset_x "-2"
viewmodel_offset_y "-2"
viewmodel_offset_z "-2"
viewmodel_presetpos "0"

// HUD ET RADAR (Illisibilité totale)
cl_hud_color "6"
hud_scaling "0.5"
cl_teamcounter_playercount_instead_of_avatars "0"
cl_showfps "2" 
cl_hud_radar_scale "1.3"
cl_radar_scale "1.0"
cl_radar_always_centered "1"
cl_radar_rotate "0"

// SOUNDS ETC
r_fullscreen_gamma "1.0"
volume "1"
snd_deathcamera_volume "0.1"
fps_max "450"
cl_autohelp "0"
cl_showloadout "1"

echo " "
echo ">>> CONFIG TROLL CHARGÉE. AMUSE-TOI BIEN DANS CET ENFER. <<<"