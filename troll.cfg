// =============================================================
// CONFIG CURSED - VERSION "PLAYABLE BUT DISGUSTING"
// =============================================================
echo "Préparation de la rétine... c'est parti."

// --- SENSIBILITÉ ---
// On part sur une sensi de speedrunner sous caféine
sensitivity "15" 
zoom_sensitivity_ratio "2.0" // Le zoom de l'AWP qui part dans le décor

// --- LE VISEUR "BOX" (Un énorme carré plein qui cache l'ennemi) ---
cl_crosshair_drawoutline "1"
cl_crosshair_outlinethickness "3"
cl_crosshairalpha "255"
cl_crosshaircolor "5"
cl_crosshaircolor_b "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_r "0"
cl_crosshairdot "1"
cl_crosshairgap "0"
cl_crosshairsize "0"
cl_crosshairstyle "4"
cl_crosshairthickness "15" // Un énorme bloc vert fluo au milieu de l'écran

// --- VIEWMODEL "T-REX" (L'arme est minuscule et au milieu de l'écran) ---
viewmodel_fov "54"
viewmodel_offset_x "-2"
viewmodel_offset_y "-2"
viewmodel_offset_z "-2"
viewmodel_presetpos "0"

// --- HUD PSYCHÉDÉLIQUE ---
cl_hud_color "6" // Rouge sang ou rose selon la version
hud_scaling "0.5" // Le HUD est tout petit dans un coin
cl_teamcounter_playercount_instead_of_avatars "0" // Remet les avatars pour avoir un max de bordel visuel en haut
cl_showfps "2" // Affiche des lignes de stats qui bougent partout à gauche

// --- LUMINOSITÉ "FLASHBANG" ---
r_fullscreen_gamma "1.0" // Image super sombre ou super blanche selon ton écran de base

// --- RADAR DE L'ESPACE ---
cl_hud_radar_scale "1.3" // Radar énorme
cl_radar_scale "1.0" // Tu ne vois que tes propres pieds sur le radar
cl_radar_always_centered "1"
cl_radar_rotate "0" // Le radar ne tourne plus, c'est à toi de deviner le nord

// --- PETIT BONUS SONORE ---
volume "1"
snd_deathcamera_volume "1" // La musique de mort bien forte pour te punir